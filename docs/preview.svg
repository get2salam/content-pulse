<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Content Pulse preview</title>
  <desc id="desc">A pink content planning board with publishing queue, content hooks, and channel-fit scoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#140b14" />
      <stop offset="100%" stop-color="#08060b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="36" y="32" width="888" height="84" rx="24" fill="#190d18" stroke="#572347" />
  <text x="66" y="72" font-family="Inter, Arial, sans-serif" font-size="28" fill="#eef2ff">Content Pulse</text>
  <text x="66" y="96" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b7c0d9">Hooks, channel fit, publish timing, and leverage for strategic content planning.</text>

  <rect x="36" y="138" width="888" height="118" rx="28" fill="#190d18" stroke="#572347" />
  <rect x="62" y="164" width="184" height="68" rx="18" fill="#261125" stroke="#572347" />
  <rect x="264" y="164" width="184" height="68" rx="18" fill="#261125" stroke="#572347" />
  <rect x="466" y="164" width="184" height="68" rx="18" fill="#261125" stroke="#572347" />
  <rect x="668" y="164" width="230" height="68" rx="18" fill="#261125" stroke="#572347" />
  <text x="84" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Ideas</text>
  <text x="84" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">16</text>
  <text x="286" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Scheduled</text>
  <text x="286" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">5</text>
  <text x="488" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Due soon</text>
  <text x="488" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">3</text>
  <text x="690" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Channel fit</text>
  <text x="690" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">7.4 / 10</text>

  <rect x="36" y="278" width="522" height="226" rx="28" fill="#190d18" stroke="#572347" />
  <text x="62" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">Publishing queue</text>
  <text x="62" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">The next ideas worth publishing, not just the ones that are easy to ship.</text>
  <rect x="62" y="356" width="470" height="54" rx="18" fill="#261125" stroke="#572347" />
  <text x="84" y="388" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Repurpose the demo into clips</text>
  <text x="340" y="388" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffc2df">X thread · 25 Apr</text>

  <rect x="62" y="422" width="470" height="54" rx="18" fill="#261125" stroke="#572347" />
  <text x="84" y="454" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">What lawyers actually lose to bad search</text>
  <text x="370" y="454" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffc2df">Carousel · fit 8/10</text>

  <rect x="584" y="278" width="340" height="226" rx="28" fill="#190d18" stroke="#572347" />
  <text x="610" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">Hook snapshot</text>
  <text x="610" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">A stronger hook earns the next few seconds and shapes the whole post.</text>
  <rect x="610" y="356" width="288" height="72" rx="16" fill="#261125" stroke="#572347" />
  <text x="630" y="382" font-family="Inter, Arial, sans-serif" font-size="14" fill="#eef2ff">Bad search is not a small annoyance,</text>
  <text x="630" y="402" font-family="Inter, Arial, sans-serif" font-size="14" fill="#eef2ff">it is a compounding revenue leak.</text>
  <rect x="610" y="448" width="288" height="18" rx="9" fill="rgba(255,255,255,0.08)" />
  <rect x="610" y="448" width="198" height="18" rx="9" fill="url(#accent)" />
</svg>
