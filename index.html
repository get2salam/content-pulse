<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Pulse</title>
    <meta name="description" content="Plan, score, and evolve content ideas that actually support the business." />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body style="--primary:#f472b6;--secondary:#fb7185;--panel:#190d18;--edge:#572347;--glow:rgba(244, 114, 182, 0.22)">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local-first micro app</p>
          <h1>Content Pulse</h1>
          <p class="lede">Plan, score, and evolve content ideas that actually support the business.</p>
        </div>
        <div class="actions">
          <button class="btn" data-action="import">Import</button>
          <button class="btn" data-action="export">Export</button>
          <button class="btn btn-primary" data-action="new">New idea</button>
          <input id="import-file" type="file" accept=".json,application/json" hidden />
        </div>
      </header>

      <section class="hero card">
        <div>
          <p class="eyebrow">Ideas board</p>
          <h2 data-role="board-title"></h2>
          <p data-role="board-subtitle"></p>
        </div>
        <p class="accent">Content should move a business forward, not just fill a calendar.</p>
      </section>

      <section class="stats" data-role="stats"></section>

      <section class="controls card">
        <label>
          <span>Search</span>
          <input type="search" data-field="search" placeholder="Search ideas..." />
        </label>
        <label>
          <span>Idea type</span>
          <select data-field="category"></select>
        </label>
        <label>
          <span>Status</span>
          <select data-field="status"></select>
        </label>
        <button class="btn" type="button" data-action="reset">Re-seed sample</button>
      </section>

      <section class="workspace">
        <article class="card list-panel">
          <div class="panel-head">
            <div>
              <strong>Ideas</strong>
              <p>Sorted by signal minus friction.</p>
            </div>
            <span class="chip" data-role="count"></span>
          </div>
          <div class="list" data-role="list"></div>
        </article>
        <article class="card editor-panel" data-role="editor"></article>
      </section>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
